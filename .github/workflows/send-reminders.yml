name: Send Habit Reminders

on:
  schedule:
    # Runs every 5 minutes (GitHub minimum granularity)
    - cron: '*/5 * * * *'
  workflow_dispatch: # allow manual trigger for testing

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install web-push @supabase/supabase-js
      - name: Send due reminders
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          VAPID_PUBLIC_KEY:     ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY:    ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT:        ${{ secrets.VAPID_SUBJECT }}
          USER_TIMEZONE:        'Asia/Hong_Kong'
        run: node .github/scripts/send-reminders.cjs
